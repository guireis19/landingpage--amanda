<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanda de Osún - Ilê Oxum Docô</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap');
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        h1, h2 { font-family: 'Poppins', sans-serif; font-weight: 700; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; }
        .btn-saiba-mais {
            border: 2px solid white;
            background: white;
            color: #f8db5c;
            border-radius: 50px;
            padding: 12px 60px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-saiba-mais:hover { background: transparent; color: white; }
    </style>
</head>
<body class="antialiased bg-stone-50">

    <nav class="fixed w-full z-[100] flex items-center justify-between px-6 py-4 lg:px-20 bg-black/20 backdrop-blur-sm">
        <div class="flex items-center gap-4">
            <img src="logoAmanda.jpeg" alt="Logo" class="h-12 w-12 object-cover rounded-full border-2 border-[#f8db5c]">
            <div class="text-xl font-bold text-white uppercase tracking-tighter">AMANDA DE OSÚN</div>
        </div>
        <div class="hidden lg:flex space-x-8 text-white text-sm uppercase font-medium">
            <a href="#inicio" class="hover:text-[#f8db5c]">Início</a>
            <a href="#sobre" class="hover:text-[#f8db5c]">Sobre</a>
            <a href="#contato" class="hover:text-[#f8db5c]">Contato</a>
        </div>
        <a href="https://wa.me/5551993032850" class="bg-[#f8db5c] text-black px-6 py-2 rounded-full font-bold text-xs uppercase">WhatsApp</a>
    </nav>

    <header id="inicio" class="relative h-screen w-full flex flex-col justify-center items-center text-center bg-cover bg-center" 
            style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('imgEspelhoPS.jpeg');">
        <h1 class="text-white text-5xl md:text-7xl px-4">
            Encontre as respostas <br> 
            <span class="serif-italic lowercase">que</span> sua alma procura
        </h1>
        <a href="#sobre" class="btn-saiba-mais mt-10 uppercase text-sm tracking-widest">Saiba Mais</a>
    </header>

    <section id="sobre" class="py-20 bg-white">
        <div class="container mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="relative group overflow-hidden rounded-2xl h-[500px] shadow-2xl">
                <div id="slider" class="flex transition-transform duration-500 h-full">
                    <img src="imgBuzios.jpeg" class="min-w-full object-cover">
                    <img src="imgEspelhoRt.jpeg" class="min-w-full object-cover">
                    <img src="imgVM.jpeg" class="min-w-full object-cover">
                </div>
                <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/20 p-3 rounded-full text-white hover:bg-black/50"><i class="fas fa-chevron-left"></i></button>
                <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/20 p-3 rounded-full text-white hover:bg-black/50"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div>
                <h2 class="text-4xl mb-6">Tradição e Axé</h2>
                <p class="text-gray-600 leading-relaxed">Orientação espiritual em Porto Alegre com seriedade e respeito aos búzios.</p>
            </div>
        </div>
    </section>

    <script>
        let currentSlide = 0;
        const slider = document.getElementById('slider');
        const totalSlides = 3;
        function updateSlider() { slider.style.transform = `translateX(-${currentSlide * 100}%)`; }
        function nextSlide() { currentSlide = (currentSlide + 1) % totalSlides; updateSlider(); }
        function prevSlide() { currentSlide = (currentSlide - 1 + totalSlides) % totalSlides; updateSlider(); }
        // Auto-play opcional
        setInterval(nextSlide, 5000);
    </script>
</body>
</html>
